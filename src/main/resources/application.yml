spring:
  application:
    name: cache-service

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: metrics,prometheus,health
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/cache-service.log
    max-size: 10MB
    max-history: 5
